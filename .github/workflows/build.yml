name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Gradle
        uses: gradle/wrapper@main
        with:
          gradle-version: 8.0
      
      - name: Build debug APK
        run: |
          cd app
          gradle assembleDebug --no-daemon
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AmapHudHelper-debug
          path: app/build/outputs/apk/debug/*.apk
